<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryBot</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ── NAVBAR ────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3 py-2">
  <span class="navbar-brand fw-bold fs-5">
    <i class="bi bi-book-half text-warning me-2"></i>StoryBot
  </span>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-secondary" id="btn-auth"
            data-bs-toggle="modal" data-bs-target="#authModal">
      <i class="bi bi-key me-1"></i>Credentials
    </button>
    <button class="btn btn-sm btn-outline-secondary" id="btn-settings"
            data-bs-toggle="modal" data-bs-target="#settingsModal">
      <i class="bi bi-gear me-1"></i>Settings
    </button>
  </div>
</nav>

<!-- ── MAIN LAYOUT ───────────────────────────────────────────────────────── -->
<div class="d-flex" style="height: calc(100vh - 56px);">

  <!-- Sidebar: worlds -->
  <aside class="sidebar bg-dark border-end border-secondary d-flex flex-column p-2"
         style="width:220px; min-width:180px;">
    <div class="d-flex justify-content-between align-items-center mb-2 px-1">
      <span class="text-muted small text-uppercase fw-semibold">Worlds</span>
      <button class="btn btn-sm btn-outline-warning py-0 px-1" id="btn-add-world"
              title="Add world">
        <i class="bi bi-plus-lg"></i>
      </button>
    </div>
    <ul class="list-unstyled flex-grow-1 overflow-auto mb-0" id="world-list"></ul>
  </aside>

  <!-- Main content -->
  <main class="flex-grow-1 d-flex flex-column overflow-hidden">

    <!-- Link input toolbar -->
    <div class="border-bottom border-secondary bg-dark p-3">
      <div class="d-flex gap-2 align-items-start flex-wrap">
        <input type="url" class="form-control form-control-sm flex-grow-1"
               id="link-input" placeholder="Paste a MeWe post or Discord thread/forum link…"
               style="min-width:260px;" />

        <!-- Mode toggle -->
        <div class="d-flex align-items-center gap-1 border border-secondary rounded px-2 py-1 mode-toggle"
             title="Toggle between AI analysis and plain text save">
          <span class="small text-info fw-semibold" id="mode-label-ai">AI</span>
          <div class="form-check form-switch mb-0 mx-1">
            <input class="form-check-input" type="checkbox" id="mode-toggle" role="switch" />
          </div>
          <span class="small text-secondary" id="mode-label-txt">Text</span>
        </div>

        <button class="btn btn-sm btn-warning" id="btn-process">
          <i class="bi bi-lightning-charge-fill me-1"></i>Process
        </button>
      </div>
      <div id="process-status" class="mt-2 small d-none"></div>
    </div>

    <!-- World content area -->
    <div class="flex-grow-1 overflow-auto p-3" id="content-area">
      <div class="text-center text-muted mt-5" id="empty-state">
        <i class="bi bi-globe2 fs-1"></i>
        <p class="mt-2">Select a world from the sidebar, or create a new one to get started.</p>
      </div>
    </div>

  </main>

</div>


<!-- ══════════════ MODALS ══════════════════════════════════════════════════ -->

<!-- Credentials modal -->
<div class="modal fade" id="authModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-key me-2"></i>Credentials</h5>
        <button type="button" class="btn-close btn-close-white"
                data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" id="authTabs">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab"
                    data-bs-target="#tab-mewe">MeWe</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab"
                    data-bs-target="#tab-discord">Discord</button>
          </li>
        </ul>

        <div class="tab-content">
          <!-- MeWe -->
          <div class="tab-pane fade show active" id="tab-mewe">
            <div id="mewe-status-badge" class="mb-3"></div>
            <div id="mewe-step-login">
              <label class="form-label small">Email</label>
              <input type="email" class="form-control form-control-sm mb-2" id="mewe-email"
                     placeholder="you@example.com" />
              <label class="form-label small">Password</label>
              <input type="password" class="form-control form-control-sm mb-2" id="mewe-password"
                     placeholder="Your MeWe password" />
              <button class="btn btn-sm btn-outline-info w-100" id="btn-mewe-login">
                Log in to MeWe
              </button>
            </div>
            <div id="mewe-auth-msg" class="mt-2 small"></div>
            <button class="btn btn-sm btn-outline-danger mt-3 d-none"
                    id="btn-mewe-logout">Logout of MeWe</button>
          </div>

          <!-- Discord -->
          <div class="tab-pane fade" id="tab-discord">
            <div id="discord-status-badge" class="mb-3"></div>
            <label class="form-label small">User Token</label>
            <div class="input-group input-group-sm">
              <input type="password" class="form-control" id="discord-token"
                     placeholder="Paste your Discord user token" />
              <button class="btn btn-outline-info" id="btn-discord-save">Save</button>
            </div>
            <div class="form-text">
              Find it in DevTools → Application → Local Storage →
              discord.com → <code>token</code>.
            </div>
            <div id="discord-auth-msg" class="mt-2 small"></div>
            <button class="btn btn-sm btn-outline-danger mt-3 d-none"
                    id="btn-discord-logout">Logout of Discord</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal fade" id="settingsModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-gear me-2"></i>Settings</h5>
        <button type="button" class="btn-close btn-close-white"
                data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label small">AI Backend</label>
          <select class="form-select form-select-sm" id="ai-backend">
            <option value="ollama">Ollama (local, no API key needed)</option>
            <option value="openai">OpenAI</option>
            <option value="none">None (text-save only)</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label small">Model Name</label>
          <input type="text" class="form-control form-control-sm" id="ai-model"
                 placeholder="llama3 / gpt-4o-mini / …" />
          <div class="form-text">Leave blank for defaults.</div>
        </div>
        <div class="mb-3" id="openai-key-row" style="display:none;">
          <label class="form-label small">OpenAI API Key</label>
          <input type="password" class="form-control form-control-sm" id="openai-key"
                 placeholder="sk-…" />
        </div>
        <div id="settings-msg" class="small"></div>
      </div>
      <div class="modal-footer border-secondary">
        <button class="btn btn-sm btn-primary" id="btn-save-settings">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Add-world modal -->
<div class="modal fade" id="addWorldModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">New World</h5>
        <button type="button" class="btn-close btn-close-white"
                data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="text" class="form-control form-control-sm mb-2"
               id="new-world-name" placeholder="World name" />
        <textarea class="form-control form-control-sm" id="new-world-desc"
                  rows="2" placeholder="Description (optional)"></textarea>
      </div>
      <div class="modal-footer border-secondary">
        <button class="btn btn-sm btn-warning" id="btn-create-world">Create</button>
      </div>
    </div>
  </div>
</div>

<!-- Story viewer modal -->
<div class="modal fade" id="storyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
    <div class="modal-content border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="story-modal-title">Story</h5>
        <button type="button" class="btn-close btn-close-white"
                data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="story-modal-body"></div>
    </div>
  </div>
</div>


<!-- ── JS ─────────────────────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
